<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Basic Settings -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title -->
    <title>Career Guide</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS Files -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

    <!-- Main App Container -->
   <div id="app">

    <!-- Header -->

    <header class="header">

        <div class="logo-section">

            <img src="assets/logo.png" alt="Career Guide Logo" class="logo">

            <div>
                <h2>Career Guide</h2>
                <p>Your Career Companion</p>
            </div>

        </div>

        <div class="menu-icon">
            ☰
        </div>

    </header>

<!-- Hero Section -->

<section class="hero">

    <h1>Hello, Kunal 👋</h1>

    <h3>Find Your Dream Career</h3>

    <p>
        Explore thousands of career options, colleges,
        entrance exams and career roadmaps.
    </p>

</section>

<!-- Search Section -->

<section class="search-section">

    <div class="search-box">

        <span class="search-icon">🔍</span>

        <input
            type="text"
            placeholder="Search careers, colleges, exams...">

    </div>

</section>

<!-- Popular Categories -->

<section class="categories">

    <div class="section-title">
        <h2>Popular Categories</h2>
        <a href="#">See All</a>
    </div>

    <div class="category-grid" id="careerGrid">

</div>

</section>

</div>
    <!-- JavaScript Files -->
    <script src="js/app.js"></script>
    <script src="js/home.js"></script>

</body>

</html>
